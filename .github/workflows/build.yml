name: Build binary release

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build_windows64:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up latest Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Get dependencies
      run: |
        pip install -r requirements.txt
        pip install nuitka requests
        py .github/workflows/get_upx.py -nf win64 .

    - name: Inject build string
      run: |
        py ./.github/workflows/inject_buildstr.py app.py
        py ./.github/workflows/inject_buildstr.py BEAMinjector.py

    - uses: Nuitka/Nuitka-Action@main
      with:
        nuitka-version: main
        script-name: BEAMinjector.py
        onefile: true

    - uses: Nuitka/Nuitka-Action@main
      with:
        nuitka-version: main
        script-name: app.py
        onefile: true

    - name: Rename files
      run: |
        mv build/BEAMinjector.exe BEAMinject.exe
        mv build/app.exe BEAMinject_GUI.exe

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: BEAMinject_nightly
        path: |
          D:\a\BEAMinject\BEAMinject\BEAMinject.exe
          D:\a\BEAMinject\BEAMinject\BEAMinject_GUI.exe
